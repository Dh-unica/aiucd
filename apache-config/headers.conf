# Disable nginx proxy buffering to fix ERR_CONTENT_LENGTH_MISMATCH for large files
# This tells the upstream nginx reverse proxy to stream responses instead of buffering them
# Root cause: nginx/1.10.3 (Ubuntu) at 90.147.144.144 has default proxy_buffers (32KB)
# which truncates files larger than ~32KB with a Content-Length mismatch error.
LoadModule headers_module /usr/lib/apache2/modules/mod_headers.so

<IfModule mod_headers.c>
    Header set X-Accel-Buffering "no"
</IfModule>
