<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" shape-rendering="crispEdges" aria-hidden="true">
  <!-- Tile 24×24 ripetibile, motivo pibiones-style:
       griglia di rombi piccoli con punti centrali, ispirata ai tessuti tradizionali
       sardi (pibiones / filet). Tutto in currentColor: si controlla l'opacità via CSS. -->
  <!-- Rombo grande centrale -->
  <rect x="11" y="3"  width="2" height="2"/>
  <rect x="9"  y="5"  width="2" height="2"/>
  <rect x="13" y="5"  width="2" height="2"/>
  <rect x="7"  y="7"  width="2" height="2"/>
  <rect x="15" y="7"  width="2" height="2"/>
  <rect x="5"  y="9"  width="2" height="2"/>
  <rect x="17" y="9"  width="2" height="2"/>
  <rect x="7"  y="11" width="2" height="2"/>
  <rect x="15" y="11" width="2" height="2"/>
  <rect x="9"  y="13" width="2" height="2"/>
  <rect x="13" y="13" width="2" height="2"/>
  <rect x="11" y="15" width="2" height="2"/>
  <!-- Pibione centrale (punto in rilievo) -->
  <rect x="11" y="9" width="2" height="2"/>
  <!-- Connessioni agli angoli per ripetizione tile -->
  <rect x="0"  y="11" width="2" height="2"/>
  <rect x="22" y="11" width="2" height="2"/>
  <rect x="11" y="0"  width="2" height="2"/>
  <rect x="11" y="22" width="2" height="2"/>
</svg>
