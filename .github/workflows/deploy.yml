name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permette deploy manuale

jobs:
  deploy:
    name: Deploy WordPress to Production
    # Vincola il deploy al runner "deploy" su 90.147.144.180 (utente dhpasteur)
    # dove risiedono i container attivi e il bind mount wordpress/ con uploads.
    # Senza la label custom, GitHub potrebbe scegliere altri runner condivisi a
    # livello organization che girano su host diversi (es. "dhruby") e produrre
    # deploy falliti con "port 8080 already allocated" + stato WordPress perso.
    runs-on: [self-hosted, aiucd-prod]
    
    steps:
      - name: 🧹 Pre-checkout Cleanup
        run: |
          echo "Pre-checkout sanity check (NO chmod, NO container shutdown)"
          # Solo metadata git eventuali
          rm -rf .git/index.lock 2>/dev/null || true
          echo "✅ Ready for checkout"

      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false  # Don't delete untracked files (WordPress runtime files)

      - name: 🛡️ Verify persistent data dirs (anti-disaster guardrail)
        env:
          AIUCD_UPLOADS_DIR: ${{ vars.AIUCD_UPLOADS_DIR || '/home/dhpasteur/aiucd-data/uploads' }}
          AIUCD_BACKUPS_DIR: ${{ vars.AIUCD_BACKUPS_DIR || '/home/dhpasteur/aiucd-data/backups' }}
        run: |
          set -e
          echo "Checking persistent data dirs OUTSIDE the runner workspace..."
          for D in "$AIUCD_UPLOADS_DIR" "$AIUCD_BACKUPS_DIR"; do
            if [ ! -d "$D" ]; then
              echo "❌ ABORT: required persistent dir missing: $D"
              echo "   Create it on the server BEFORE re-running the deploy."
              exit 1
            fi
          done
          UPLOADS_FILES=$(find "$AIUCD_UPLOADS_DIR" -mindepth 1 -maxdepth 1 | wc -l)
          if [ "$UPLOADS_FILES" -lt 1 ]; then
            echo "❌ ABORT: $AIUCD_UPLOADS_DIR is EMPTY."
            echo "   Refusing to deploy to avoid wiping uploads on first start."
            echo "   Restore uploads into $AIUCD_UPLOADS_DIR and retry."
            exit 1
          fi
          echo "✅ Uploads dir OK ($UPLOADS_FILES top-level entries) — $AIUCD_UPLOADS_DIR"
          echo "✅ Backups dir OK — $AIUCD_BACKUPS_DIR"
      
      - name: 🔍 Diagnostic - Analyze Permissions
        run: |
          echo "=== PERMISSION DIAGNOSTIC ==="
          echo ""
          echo "1. Current user and groups:"
          whoami
          id
          echo ""
          echo "2. WordPress directory ownership (top 20 files):"
          ls -lah wordpress/ | head -n 20 || echo "wordpress/ not found"
          echo ""
          echo "3. Docker container www-data UID/GID (if running):"
          docker compose exec -T wordpress id www-data 2>/dev/null || echo "Container not running"
          echo ""
          echo "4. wp-config.php ownership:"
          ls -lah wordpress/wp-config.php 2>/dev/null || echo "wp-config.php not found"
          echo ""
          echo "5. Current directory:"
          pwd
          ls -lah
          echo ""
          echo "=== END DIAGNOSTIC ==="
      
      - name: 📋 Display deployment info
        run: |
          echo "🚀 Deploying to Production"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Message: ${{ github.event.head_commit.message }}"
      
      - name: 💾 Pre-deploy BACKUP (DB + uploads — mandatory)
        id: backup
        env:
          AIUCD_BACKUPS_DIR: ${{ vars.AIUCD_BACKUPS_DIR || '/home/dhpasteur/aiucd-data/backups' }}
          AIUCD_UPLOADS_DIR: ${{ vars.AIUCD_UPLOADS_DIR || '/home/dhpasteur/aiucd-data/uploads' }}
          BACKUP_SCRIPT: /home/dhpasteur/aiucd-data/scripts/backup-daily.sh
        run: |
          set -e
          # Se i container non sono ancora su (primissimo deploy assoluto), il
          # backup DB e' impossibile ed e' accettabile saltarlo. Altrimenti il
          # backup e' BLOCCANTE: se fallisce, NON deployiamo.
          if ! docker compose ps 2>/dev/null | grep -q "Up"; then
            echo "⚠️  Containers not running — primissimo deploy? Skip backup."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -x "$BACKUP_SCRIPT" ]; then
            echo "❌ ABORT: backup script missing or not executable: $BACKUP_SCRIPT"
            echo "   Lo script vive in /home/dhpasteur/aiucd-data/scripts/ ed è"
            echo "   richiesto sia da check-updates.yml sia da questo workflow."
            exit 1
          fi

          # Label dedicata al deploy con SHA breve per audit trail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          LABEL="pre_deploy_${SHORT_SHA}"
          echo "Running backup with label=$LABEL ..."
          OUTPUT=$("$BACKUP_SCRIPT" --label "$LABEL")
          echo "$OUTPUT"

          DB_PATH=$(echo "$OUTPUT" | grep -oE 'BACKUP_DB_PATH=.+' | cut -d= -f2-)
          FILES_PATH=$(echo "$OUTPUT" | grep -oE 'BACKUP_FILES_PATH=.+' | cut -d= -f2-)

          if [ -z "$DB_PATH" ] || [ -z "$FILES_PATH" ] || [ ! -s "$DB_PATH" ] || [ ! -s "$FILES_PATH" ]; then
            echo "❌ ABORT: pre-deploy backup missing or empty — refusing to deploy"
            exit 1
          fi

          DB_SIZE=$(du -h "$DB_PATH"    | cut -f1)
          FILES_SIZE=$(du -h "$FILES_PATH" | cut -f1)
          DB_MD5=$(md5sum "$DB_PATH"    | cut -d' ' -f1)
          FILES_MD5=$(md5sum "$FILES_PATH" | cut -d' ' -f1)

          echo "✅ Backup OK"
          echo "   DB:    $DB_PATH ($DB_SIZE md5=$DB_MD5)"
          echo "   Files: $FILES_PATH ($FILES_SIZE md5=$FILES_MD5)"

          # Retention dei pre_deploy_*: mantieni solo gli ultimi 10 per categoria
          # (lo script ruota solo i 'daily', i 'pre_*' restano per audit; qui
          # cappiamo per non saturare lo storage)
          ls -t "$AIUCD_BACKUPS_DIR"/db_pre_deploy_*.sql.gz 2>/dev/null | tail -n +11 | xargs -r rm -v || true
          ls -t "$AIUCD_BACKUPS_DIR"/uploads_pre_deploy_*.tar.gz 2>/dev/null | tail -n +11 | xargs -r rm -v || true

          {
            echo "skipped=false"
            echo "db_path=$DB_PATH"
            echo "files_path=$FILES_PATH"
            echo "db_size=$DB_SIZE"
            echo "files_size=$FILES_SIZE"
            echo "db_md5=$DB_MD5"
            echo "files_md5=$FILES_MD5"
          } >> "$GITHUB_OUTPUT"
      
      - name: 🔧 Update Configuration
        env:
          AIUCD_UPLOADS_DIR: ${{ vars.AIUCD_UPLOADS_DIR || '/home/dhpasteur/aiucd-data/uploads' }}
          AIUCD_BACKUPS_DIR: ${{ vars.AIUCD_BACKUPS_DIR || '/home/dhpasteur/aiucd-data/backups' }}
        run: |
          echo "Checking configuration files..."

          # Ensure .env exists (don't overwrite if exists)
          if [ ! -f .env ]; then
            if [ -f .env.example ]; then
              echo "⚠️  .env not found, copying from .env.example"
              cp .env.example .env
              echo "⚠️  WARNING: Using default credentials from .env.example"
              echo "⚠️  For production, update .env with secure credentials!"
              echo ""
              echo "To update credentials on production server:"
              echo "  1. SSH into the server"
              echo "  2. Edit the .env file in the project directory"
              echo "  3. Run: docker compose down && docker compose up -d"
            else
              echo "❌ ERROR: Neither .env nor .env.example found!"
              exit 1
            fi
          fi

          # Idempotent: ensure persistent data dir vars are present and aligned
          for KV in "AIUCD_UPLOADS_DIR=$AIUCD_UPLOADS_DIR" "AIUCD_BACKUPS_DIR=$AIUCD_BACKUPS_DIR"; do
            KEY="${KV%%=*}"
            if grep -q "^${KEY}=" .env; then
              # Replace value if differs
              sed -i "s|^${KEY}=.*|${KV}|" .env
            else
              echo "$KV" >> .env
            fi
          done
          echo "✅ Configuration ready (AIUCD_UPLOADS_DIR=$AIUCD_UPLOADS_DIR)"
      
      - name: 🚧 Maintenance Mode ON
        env:
          WPCLI_IMAGE: wordpress:cli-2.10
        run: |
          # Attiva la maintenance page WP per i visitatori (file .maintenance
          # nel docroot di WP). Vive nel bind mount wordpress/, quindi sopravvive
          # al docker compose down/up successivo. Skippiamo silenziosamente se i
          # container non sono su (primissimo deploy).
          if ! docker compose ps 2>/dev/null | grep -q "Up"; then
            echo "⚠️  Containers not running — skip maintenance ON"
            exit 0
          fi
          docker pull -q "$WPCLI_IMAGE" >/dev/null || true
          WP_ENV_FILE="$(mktemp)"
          trap 'rm -f "$WP_ENV_FILE"' EXIT
          docker inspect aiucd_wordpress --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -E '^WORDPRESS_' > "$WP_ENV_FILE"
          docker run --rm \
            --env-file "$WP_ENV_FILE" \
            --network aiucd_aiucd_network \
            --volumes-from aiucd_wordpress \
            --workdir /var/www/html \
            -u 1001:1001 \
            "$WPCLI_IMAGE" wp maintenance-mode activate || echo "⚠️  Maintenance activate failed (non-fatal)"
          echo "✅ Maintenance mode ON"

      - name: 🐳 Deploy Docker Containers
        env:
          AIUCD_UPLOADS_DIR: ${{ vars.AIUCD_UPLOADS_DIR || '/home/dhpasteur/aiucd-data/uploads' }}
        run: |
          echo "Deploying containers (uploads bind: $AIUCD_UPLOADS_DIR)..."

          docker compose down || true
          docker compose pull --quiet
          docker compose up -d

          sleep 5

          echo "Container status:"
          docker compose ps

          echo ""
          echo "Effective uploads mount:"
          docker compose exec -T wordpress sh -c "mount | grep wp-content/uploads || true; ls -la /var/www/html/wp-content/uploads | head -5"

          echo ""
          echo "WordPress container logs:"
          docker compose logs --tail=20 wordpress

          echo "✅ Containers deployed"
      
      - name: 🩺 Liveness check (via wp-cli, bypassa maintenance)
        env:
          WPCLI_IMAGE: wordpress:cli-2.10
        run: |
          # Verifichiamo che WP carichi e parli col DB anche con .maintenance
          # attivo: il health check HTTP successivo riceve 503 (maintenance ON)
          # e quindi NON e' affidabile prima di disattivarla. Qui usiamo wp-cli
          # per ottenere una liveness probe vera (DB up + filesystem WP coerente).
          echo "Waiting 10s for WP to boot..."
          sleep 10

          WP_ENV_FILE="$(mktemp)"
          trap 'rm -f "$WP_ENV_FILE"' EXIT
          docker inspect aiucd_wordpress --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -E '^WORDPRESS_' > "$WP_ENV_FILE"
          run_wp() {
            docker run --rm \
              --env-file "$WP_ENV_FILE" \
              --network aiucd_aiucd_network \
              --volumes-from aiucd_wordpress \
              --workdir /var/www/html \
              -u 1001:1001 \
              "$WPCLI_IMAGE" "$@"
          }

          MAX_ATTEMPTS=15
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            # `wp option get siteurl` carica WP, fa una query SELECT alla
            # tabella wp_options. Funziona anche con .maintenance attivo
            # (wp-cli scavalca la maintenance gate).
            if SITEURL=$(run_wp wp option get siteurl 2>&1) && [ -n "$SITEURL" ]; then
              echo "✅ WP+DB up — siteurl=$SITEURL"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "⏳ wp-cli liveness... attempt $ATTEMPT/$MAX_ATTEMPTS"
            sleep 2
          done
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ WP+DB liveness FAILED"
            docker compose ps
            docker compose logs --tail=80 wordpress
            docker compose logs --tail=40 db
            exit 1
          fi

          # Verifica plugin must-use e plugin attivi (sanity check post-deploy)
          echo ""
          echo "Plugins attivi:"
          run_wp wp plugin list --status=active --fields=name,version --format=table || true
          echo ""
          echo "Plugin aiucd-companion status:"
          run_wp wp plugin status aiucd-companion 2>&1 | head -5 || true

      - name: ✅ Maintenance Mode OFF
        if: success()
        env:
          WPCLI_IMAGE: wordpress:cli-2.10
        run: |
          if ! docker compose ps 2>/dev/null | grep -q "Up"; then
            echo "⚠️  Containers not running — skip maintenance OFF"
            exit 0
          fi
          WP_ENV_FILE="$(mktemp)"
          trap 'rm -f "$WP_ENV_FILE"' EXIT
          docker inspect aiucd_wordpress --format '{{range .Config.Env}}{{println .}}{{end}}' \
            | grep -E '^WORDPRESS_' > "$WP_ENV_FILE"
          docker run --rm \
            --env-file "$WP_ENV_FILE" \
            --network aiucd_aiucd_network \
            --volumes-from aiucd_wordpress \
            --workdir /var/www/html \
            -u 1001:1001 \
            "$WPCLI_IMAGE" wp maintenance-mode deactivate || echo "⚠️  Maintenance deactivate failed"
          # Fallback: rimuovi a mano il file se wp-cli non l'ha cancellato
          docker compose exec -T wordpress sh -c 'rm -f /var/www/html/.maintenance' || true
          echo "✅ Maintenance mode OFF"

      - name: 🏥 HTTP Health Check (post-maintenance)
        run: |
          # Ora la maintenance è disattiva: WP deve rispondere 200/301/302.
          echo "Running HTTP health check..."
          MAX_ATTEMPTS=15
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:7000 || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "✅ WordPress responding (HTTP $HTTP_CODE)"
              curl -sI http://localhost:7000 | head -n 10
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            echo "⏳ Waiting... attempt $ATTEMPT/$MAX_ATTEMPTS (HTTP: $HTTP_CODE)"
            sleep 2
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ HTTP health check failed!"
            docker compose ps
            docker compose logs --tail=50 wordpress
            exit 1
          fi

          # Check container status
          if docker compose ps | grep -q "Exit"; then
            echo "❌ Some containers exited!"
            docker compose ps
            docker compose logs
            exit 1
          fi

          echo "✅ All HTTP health checks passed"

      - name: 🧹 Cleanup
        if: always()
        run: |
          echo "Cleaning up..."
          # Remove old Docker images
          docker image prune -f --filter "until=24h" || true
          
          # Show final status
          echo "Final container status:"
          docker compose ps
      
      - name: 📊 Deployment Summary
        if: success()
        run: |
          echo "================================"
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "================================"
          echo "🌐 WordPress: http://localhost:7000"
          echo "🗄️  phpMyAdmin: http://localhost:8080"
          echo "📅 Deployed at: $(date)"
          echo "🔖 Commit: ${{ github.sha }}"
          echo ""
          echo "🛟 Pre-deploy backups (sul server, fuori workspace CI):"
          echo "   skipped:    ${{ steps.backup.outputs.skipped }}"
          echo "   db_path:    ${{ steps.backup.outputs.db_path }}"
          echo "   files_path: ${{ steps.backup.outputs.files_path }}"
          echo "   db_size:    ${{ steps.backup.outputs.db_size }} (md5=${{ steps.backup.outputs.db_md5 }})"
          echo "   files_size: ${{ steps.backup.outputs.files_size }} (md5=${{ steps.backup.outputs.files_md5 }})"
          echo "================================"
      
      - name: 🔴 Rollback hints on Failure
        if: failure()
        env:
          AIUCD_BACKUPS_DIR: ${{ vars.AIUCD_BACKUPS_DIR || '/home/dhpasteur/aiucd-data/backups' }}
        run: |
          echo "================================"
          echo "❌ DEPLOYMENT FAILED — diagnostic only (no auto-rollback)"
          echo "================================"
          echo ""
          echo "🛟 Backup di questo run (per restore manuale):"
          echo "   skipped:    ${{ steps.backup.outputs.skipped }}"
          echo "   db_path:    ${{ steps.backup.outputs.db_path }}"
          echo "   files_path: ${{ steps.backup.outputs.files_path }}"
          echo ""
          echo "Backups recenti in $AIUCD_BACKUPS_DIR :"
          ls -lh "$AIUCD_BACKUPS_DIR"/db_*.sql.gz 2>/dev/null    | tail -5 || echo "  (no DB backups)"
          ls -lh "$AIUCD_BACKUPS_DIR"/uploads_*.tar.gz 2>/dev/null | tail -5 || echo "  (no uploads backups)"
          echo ""
          echo "Restore DB:    zcat <db_pre_deploy_*.sql.gz> | docker compose exec -T db sh -c 'mysql -uroot -p\"\$MYSQL_ROOT_PASSWORD\" wordpress'"
          echo "Restore files: tar -xzf <uploads_pre_deploy_*.tar.gz> -C $(dirname "$AIUCD_BACKUPS_DIR")"
          echo ""
          echo "🚧 Maintenance mode rimasto attivo. Per disattivare manualmente:"
          echo "   docker run --rm --env-file <(docker inspect aiucd_wordpress --format '{{range .Config.Env}}{{println .}}{{end}}' | grep '^WORDPRESS_') \\"
          echo "     --network aiucd_aiucd_network --volumes-from aiucd_wordpress --workdir /var/www/html -u 1001:1001 \\"
          echo "     wordpress:cli-2.10 wp maintenance-mode deactivate"
          echo ""
          echo "Container status:"
          docker compose ps || true
          echo ""
          echo "Recent logs:"
          docker compose logs --tail=80 || true