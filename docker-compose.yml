services:
  # WordPress Service
  wordpress:
    image: wordpress:6.8.3-apache
    container_name: aiucd_wordpress
    restart: unless-stopped
    # Run as host user to avoid permission issues
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    ports:
      - "7000:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_URL: ${WORDPRESS_URL:-http://localhost:7000}
      WORDPRESS_AUTH_KEY: ${WORDPRESS_AUTH_KEY}
      WORDPRESS_SECURE_AUTH_KEY: ${WORDPRESS_SECURE_AUTH_KEY}
      WORDPRESS_LOGGED_IN_KEY: ${WORDPRESS_LOGGED_IN_KEY}
      WORDPRESS_NONCE_KEY: ${WORDPRESS_NONCE_KEY}
      WORDPRESS_AUTH_SALT: ${WORDPRESS_AUTH_SALT}
      WORDPRESS_SECURE_AUTH_SALT: ${WORDPRESS_SECURE_AUTH_SALT}
      WORDPRESS_LOGGED_IN_SALT: ${WORDPRESS_LOGGED_IN_SALT}
      WORDPRESS_NONCE_SALT: ${WORDPRESS_NONCE_SALT}
      WORDPRESS_CONFIG_EXTRA: ${WORDPRESS_CONFIG_EXTRA}
      # Ensure Apache runs with correct permissions
      APACHE_RUN_USER: "#${DOCKER_UID:-1000}"
      APACHE_RUN_GROUP: "#${DOCKER_GID:-1000}"
    volumes:
      # Bind mount per codice versionabile
      - ./wordpress:/var/www/html
      # Uploads persistenti FUORI dal workspace del runner CI
      # (vedi README "Persistenza dati") per evitare cancellazione su checkout
      - ${AIUCD_UPLOADS_DIR:-./wordpress/wp-content/uploads}:/var/www/html/wp-content/uploads
      # PHP configuration for upload limits
      - ./php-config/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      # Apache config for mod_headers (X-Accel-Buffering: disable nginx proxy buffering)
      - ./apache-config/headers.conf:/etc/apache2/conf-enabled/headers.conf:ro
    depends_on:
      - db
    networks:
      - aiucd_network

  # MariaDB Database Service
  db:
    image: mariadb:10.11.5
    container_name: aiucd_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - aiucd_network

  # phpMyAdmin Service (Optional)
  # Avviato solo su richiesta: `docker compose --profile admin up -d`
  # In produzione non serve: evita conflitti sulla porta 8080.
  phpmyadmin:
    image: phpmyadmin:5.2.1
    container_name: aiucd_phpmyadmin
    restart: unless-stopped
    profiles:
      - admin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - aiucd_network

# Named Volumes for Data Persistence
volumes:
  # wordpress_uploads volume removed - now using bind mount with proper permissions
  db_data:
    driver: local

# Custom Network for Service Isolation
networks:
  aiucd_network:
    driver: bridge